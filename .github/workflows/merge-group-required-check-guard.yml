name: Merge-group required-check guard

# Validates that every required status check has a workflow with
# merge_group: {types: [checks_requested]} in its on: block.
# Without this, the merge queue permanently deadlocks (config-I3682).
#
# This guard is NOT a required check itself (self-referential).
# Logic: nousergon/nousergon-lib/.github/workflows/merge-group-required-check-guard.yml@main
# Rollout: config-I3711.

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  guard:
    uses: nousergon/nousergon-lib/.github/workflows/merge-group-required-check-guard.yml@main
