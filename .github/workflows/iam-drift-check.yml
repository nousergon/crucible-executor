name: IAM Drift Check

# Catches two regression classes for codified IAM under
# infrastructure/iam/<role>/<policy>.json:
#
#   1. drift between codified state and live AWS state
#      (check-drift.py — needs OIDC read access to AWS IAM)
#   2. foreign writers in sibling repos that bypass codification
#      (check-no-foreign-writers.py — pure source scan, no AWS auth)
#
# Triggers:
#   - Every PR that touches infrastructure/iam/** (catches code changes
#     that forgot to apply, or applies that forgot to commit, before merge)
#   - Daily at 09:30 UTC (catches out-of-band manual IAM edits + new
#     foreign writers landed in sibling repos)
#   - Manual via workflow_dispatch
#
# AWS auth: OIDC → github-actions-iam-drift-check role (read-only:
# iam:ListRolePolicies + iam:GetRolePolicy on the codified roles only).

on:
  pull_request:
    paths:
      - 'infrastructure/iam/**'
      - '.github/workflows/iam-drift-check.yml'
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::711398986525:role/github-actions-iam-drift-check
          aws-region: us-east-1

      - name: Run IAM drift check (codified vs live AWS)
        run: python3 infrastructure/iam/check-drift.py

  foreign-writers-check:
    runs-on: ubuntu-latest
    # No AWS access — pure source scan across sibling repos.
    steps:
      - name: Checkout alpha-engine
        uses: actions/checkout@v4
        with:
          path: alpha-engine

      - name: Checkout sibling repos
        run: |
          set -e
          for repo in nousergon-data crucible-research crucible-predictor \
                      crucible-backtester crucible-dashboard nousergon-lib; do
            git clone --depth=1 https://github.com/nousergon/${repo}.git ${repo} || \
              echo "WARN: ${repo} not cloneable (private/archived?) — skipping"
          done

      - name: Run foreign-writers check across all sibling repos
        run: |
          cd alpha-engine
          python3 infrastructure/iam/check-no-foreign-writers.py \
            $(for d in ../crucible-* ../nousergon-*; do [ -d "$d" ] && echo --repo "$d"; done)
