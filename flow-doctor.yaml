flow_name: executor
repo: nousergon/crucible-executor
owner: "@brianmcmahon"
notify:
  - type: email
    sender: ${EMAIL_SENDER}
    recipients: ${EMAIL_RECIPIENTS}
    smtp_host: smtp.gmail.com
    smtp_port: 587
    smtp_password: ${GMAIL_APP_PASSWORD}
  - type: github
    repo: nousergon/alpha-engine-config
    token: ${FLOW_DOCTOR_GITHUB_TOKEN}
    labels: [flow-doctor, area:executor]
    notify_on_category: [CODE, CONFIG]
  # Telegram forum-topic routing (config#1741). Canonical spec:
  # nousergon_lib.flow_doctor_fleet::EXECUTOR_FLOW_DOCTOR_TELEGRAM_TOPICS
  - type: telegram
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    message_thread_id: ${FLOW_DOCTOR_TELEGRAM_THREAD_CRITICAL}
    parse_mode: Markdown
    disable_notification: false
    notify_on: [critical]
  - type: telegram
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    message_thread_id: ${FLOW_DOCTOR_TELEGRAM_THREAD_OPS_HEALTH}
    parse_mode: Markdown
    disable_notification: false
    notify_on: [error, warning]
    notify_on_category: [TRANSIENT, EXTERNAL, INFRA]
  - type: telegram
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    message_thread_id: ${FLOW_DOCTOR_TELEGRAM_THREAD_TRADES}
    parse_mode: Markdown
    disable_notification: false
    notify_on: [info]
  - type: s3
    bucket: alpha-engine-research
    subsystem: executor
# DynamoDB, not ephemeral /tmp SQLite: this process runs across separate
# EC2/spot invocations that don't share a filesystem, so a /tmp-backed store
# silently resets every time — dedup_cooldown_minutes below can never
# actually suppress a repeat alert if the dedup state doesn't survive the
# process that wrote it. DynamoDB gives us a shared store across invocations.
store:
  type: dynamodb
  table_name: flow-doctor-store
  region: us-east-1
dedup_cooldown_minutes: 60
dependencies:
  - predictor-inference
  - data-phase1
rate_limits:
  max_alerts_per_day: 10
  max_issues_per_day: 3
  max_diagnosed_per_day: 3
