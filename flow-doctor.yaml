flow_name: executor
repo: cipher813/alpha-engine
owner: "@brianmcmahon"
notify:
  - type: email
    sender: ${EMAIL_SENDER}
    recipients: ${EMAIL_RECIPIENTS}
    smtp_host: smtp.gmail.com
    smtp_port: 587
    smtp_password: ${GMAIL_APP_PASSWORD}
  - type: github
    repo: cipher813/alpha-engine
    token: ${FLOW_DOCTOR_GITHUB_TOKEN}
  # Telegram fires on the same error report as the GitHub issue (the issue
  # and the alert land together). Creds resolve from the ae-trading box's
  # ~/.alpha-engine.env (TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID).
  - type: telegram
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
  - type: s3
    bucket: alpha-engine-research
    subsystem: executor
store:
  type: sqlite
  path: /tmp/flow_doctor.db
dedup_cooldown_minutes: 60
dependencies:
  - predictor-inference
  - data-phase1
rate_limits:
  max_alerts_per_day: 10
  max_issues_per_day: 3
  max_diagnosed_per_day: 3
